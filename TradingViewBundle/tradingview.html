<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0A0A0A; }
        #tv_chart_container { width: 100%; height: 100%; }

        /* Enlarge the native TradingView left toolbar toggle for easier mobile tapping */
        .layout__area--left [class*="arrow"],
        .layout__area--left [class*="toggle"],
        [data-name="drawing-toolbar"] [class*="arrow"],
        [data-name="drawing-toolbar"] [class*="toggle"] {
            min-width: 28px !important;
            min-height: 44px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
    </style>
    <script type="text/javascript" src="charting_library.standalone.js"></script>
</head>
<body>
    <div id="tv_chart_container"></div>

    <script>
    // ═══════════════════════════════════════════════════════════════
    //  Hyperliquid Custom Datafeed for TradingView Advanced Charts
    // ═══════════════════════════════════════════════════════════════

    // Pending requests map: requestId → { resolve, reject }
    const pendingRequests = {};
    let requestCounter = 0;

    // Real-time subscriber
    let realtimeCallback = null;
    let realtimeSubscriberUID = null;

    // Send a request to Swift and return a Promise
    function sendToSwift(type, payload) {
        return new Promise((resolve, reject) => {
            const id = ++requestCounter;
            pendingRequests[id] = { resolve, reject };
            window.webkit.messageHandlers.tradingview.postMessage(
                JSON.stringify({ id, type, ...payload })
            );
            // Timeout after 15s
            setTimeout(() => {
                if (pendingRequests[id]) {
                    delete pendingRequests[id];
                    reject(new Error('Request timeout'));
                }
            }, 15000);
        });
    }

    // Called from Swift to resolve pending requests
    function resolveRequest(id, data) {
        const req = pendingRequests[id];
        if (req) {
            delete pendingRequests[id];
            req.resolve(data);
        }
    }

    function rejectRequest(id, error) {
        const req = pendingRequests[id];
        if (req) {
            delete pendingRequests[id];
            req.reject(new Error(error));
        }
    }

    // Called from Swift to push real-time bar updates
    function onRealtimeBar(bar) {
        if (realtimeCallback) {
            realtimeCallback(bar);
        }
    }

    // ─── TradingView resolution mapping ────────────────────────
    const supportedResolutions = [
        '1', '2', '3', '5', '15', '30',
        '60', '120', '240', '480', '720',
        '1D', '3D', '1W', '1M'
    ];

    // Map TradingView resolution to Hyperliquid interval string
    function resolutionToHL(resolution) {
        const map = {
            '1': '1m', '2': '2m', '3': '3m', '5': '5m',
            '15': '15m', '30': '30m', '60': '1h', '120': '2h',
            '240': '4h', '480': '8h', '720': '12h',
            '1D': '1d', '3D': '3d', '1W': '1w', '1M': '1M'
        };
        return map[resolution] || '1h';
    }

    // ─── Global flag: true when displaying a custom TradingView symbol ──
    let isCustomSymbol = false;

    // ─── Unified Datafeed (routes to HL or external via Swift bridge) ──
    const UnifiedDatafeed = {

        onReady: function(callback) {
            setTimeout(() => {
                callback({
                    supported_resolutions: supportedResolutions,
                    supports_marks: false,
                    supports_timescale_marks: false,
                    supports_time: true,
                    exchanges: [],
                });
            }, 0);
        },

        searchSymbols: function(userInput, exchange, symbolType, onResult) {
            onResult([]);
        },

        resolveSymbol: function(symbolName, onResolve, onError) {
            sendToSwift('resolveSymbol', { symbol: symbolName, isCustom: isCustomSymbol })
                .then(info => {
                    const exchange = isCustomSymbol
                        ? (info.exchange || symbolName.split(':')[0] || 'External')
                        : 'Hyperliquid';
                    onResolve({
                        name: info.name || symbolName,
                        description: info.description || symbolName,
                        type: info.type || 'crypto',
                        session: '24x7',
                        timezone: 'Etc/UTC',
                        exchange: exchange,
                        listed_exchange: exchange,
                        minmov: 1,
                        pricescale: info.pricescale || 100,
                        has_intraday: true,
                        has_daily: true,
                        has_weekly_and_monthly: true,
                        supported_resolutions: supportedResolutions,
                        volume_precision: 2,
                        data_status: isCustomSymbol ? 'pulsed' : 'streaming',
                    });
                })
                .catch(err => onError(err.message));
        },

        getBars: function(symbolInfo, resolution, periodParams, onResult, onError) {
            const hlInterval = resolutionToHL(resolution);
            sendToSwift('getBars', {
                symbol: symbolInfo.name,
                interval: hlInterval,
                from: periodParams.from,
                to: periodParams.to,
                countBack: periodParams.countBack,
                firstDataRequest: periodParams.firstDataRequest,
                isCustom: isCustomSymbol
            })
            .then(data => {
                const bars = (data.bars || []).map(b => ({
                    time: b.time,
                    open: b.open,
                    high: b.high,
                    low: b.low,
                    close: b.close,
                    volume: b.volume
                }));
                onResult(bars, { noData: data.noData || false });
            })
            .catch(err => onError(err.message));
        },

        subscribeBars: function(symbolInfo, resolution, onRealtimeCallback, subscriberUID, onResetCacheNeededCallback) {
            realtimeCallback = onRealtimeCallback;
            realtimeSubscriberUID = subscriberUID;
            const hlInterval = resolutionToHL(resolution);
            sendToSwift('subscribeBars', {
                symbol: symbolInfo.name,
                interval: hlInterval,
                subscriberUID: subscriberUID,
                isCustom: isCustomSymbol
            }).catch(() => {});
        },

        unsubscribeBars: function(subscriberUID) {
            if (realtimeSubscriberUID === subscriberUID) {
                realtimeCallback = null;
                realtimeSubscriberUID = null;
            }
            sendToSwift('unsubscribeBars', { subscriberUID })
                .catch(() => {});
        }
    };

    // ─── Widget initialization ─────────────────────────────────
    let tvWidget = null;

    function initChart(symbol, interval, theme, custom) {
        if (tvWidget) {
            tvWidget.remove();
            tvWidget = null;
        }

        // Detect custom TradingView symbol (TV: prefix or explicit flag)
        isCustomSymbol = !!custom || (symbol && symbol.startsWith('TV:'));
        let actualSymbol = symbol;
        if (actualSymbol && actualSymbol.startsWith('TV:')) {
            actualSymbol = actualSymbol.substring(3);
        }

        const tvInterval = interval || '60';

        tvWidget = new TradingView.widget({
            container: 'tv_chart_container',
            datafeed: UnifiedDatafeed,
            library_path: './',
            locale: 'en',
            fullscreen: true,
            symbol: actualSymbol || 'BTC',
            interval: tvInterval,
            theme: 'dark',
            autosize: true,
            timezone: 'Etc/UTC',

            // ── Styling ──────────────────────────────
            custom_css_url: '',
            loading_screen: { backgroundColor: '#0A0A0A', foregroundColor: '#1DB954' },

            overrides: {
                'paneProperties.background': '#0A0A0A',
                'paneProperties.backgroundType': 'solid',
                'paneProperties.vertGridProperties.color': '#1a1a1a',
                'paneProperties.horzGridProperties.color': '#1a1a1a',
                'scalesProperties.backgroundColor': '#0A0A0A',
                'scalesProperties.textColor': '#666666',
                'scalesProperties.lineColor': '#1a1a1a',
                'mainSeriesProperties.candleStyle.upColor': '#1DB954',
                'mainSeriesProperties.candleStyle.downColor': '#E54D42',
                'mainSeriesProperties.candleStyle.wickUpColor': '#1DB954',
                'mainSeriesProperties.candleStyle.wickDownColor': '#E54D42',
                'mainSeriesProperties.candleStyle.borderUpColor': '#1DB954',
                'mainSeriesProperties.candleStyle.borderDownColor': '#E54D42',
                'mainSeriesProperties.hollowCandleStyle.upColor': '#1DB954',
                'mainSeriesProperties.hollowCandleStyle.downColor': '#E54D42',
                'mainSeriesProperties.haStyle.upColor': '#1DB954',
                'mainSeriesProperties.haStyle.downColor': '#E54D42',
                'mainSeriesProperties.haStyle.wickUpColor': '#1DB954',
                'mainSeriesProperties.haStyle.wickDownColor': '#E54D42',
                'mainSeriesProperties.haStyle.borderUpColor': '#1DB954',
                'mainSeriesProperties.haStyle.borderDownColor': '#E54D42',
                'mainSeriesProperties.barStyle.upColor': '#1DB954',
                'mainSeriesProperties.barStyle.downColor': '#E54D42',
                'mainSeriesProperties.lineStyle.color': '#1DB954',
                'mainSeriesProperties.areaStyle.linecolor': '#1DB954',
                'mainSeriesProperties.areaStyle.color1': 'rgba(29,185,84,0.28)',
                'mainSeriesProperties.areaStyle.color2': 'rgba(29,185,84,0.02)',
                'mainSeriesProperties.baselineStyle.topLineColor': '#1DB954',
                'mainSeriesProperties.baselineStyle.bottomLineColor': '#E54D42',
                'volumePaneSize': 'tiny',
            },

            studies_overrides: {
                'volume.volume.color.0': '#E54D42',
                'volume.volume.color.1': '#1DB954',
                'volume.volume.transparency': 70,
            },

            disabled_features: [
                'use_localstorage_for_settings',
                'header_symbol_search',
                'header_compare',
                'header_screenshot',
                'header_fullscreen_button',
                'header_saveload',
                'go_to_date',
                'volume_force_overlay',
                'symbol_search_hot_key',
                'border_around_the_chart',
                // Additional: reduce init overhead for faster first paint
                'create_volume_indicator_by_default',  // defer volume to after first paint
                'header_undo_redo',                    // rarely used on mobile
                'display_market_status',               // not needed for 24/7 crypto
                'timeframes_toolbar',                  // bottom bar, already empty
                'context_menus',                       // right-click menus, not needed on mobile
                'control_bar',                         // bottom control bar
            ],

            enabled_features: [
                'move_logo_to_main_pane',
                'hide_left_toolbar_by_default',
            ],

            time_frames: [],
        });

        tvWidget.onChartReady(function() {
            // Notify Swift IMMEDIATELY — hides skeleton for fastest perceived load.
            window.webkit.messageHandlers.tradingview.postMessage(
                JSON.stringify({ type: 'chartReady' })
            );

            // Defer volume study to next event loop tick — after first paint.
            setTimeout(function() {
                try {
                    var chart = tvWidget.activeChart();
                    var studies = chart.getAllStudies();
                    var hasVolume = studies.some(function(s) { return s.name === 'Volume'; });
                    if (!hasVolume) {
                        chart.createStudy('Volume', false, false, {}, null, {
                            'volume.volume.color.0': '#E54D42',
                            'volume.volume.color.1': '#1DB954',
                            'volume.volume.transparency': 70,
                        });
                    }
                    // Force volume pane to minimal height
                    var allPanes = chart.getPanes();
                    if (allPanes && allPanes.length > 1) {
                        // Volume is typically the second pane — set its height ratio small
                        try {
                            allPanes[allPanes.length - 1].setHeight(60);
                        } catch(e2) {}
                    }
                } catch(e) {}
            }, 0);
        });
    }

    // Called from Swift to change symbol
    function changeSymbol(symbol, interval, custom) {
        // Remove stale price line from previous symbol
        removeLivePriceLine();

        // Update custom flag
        isCustomSymbol = !!custom || (symbol && symbol.startsWith('TV:'));
        let actualSymbol = symbol;
        if (actualSymbol && actualSymbol.startsWith('TV:')) {
            actualSymbol = actualSymbol.substring(3);
        }

        if (tvWidget) {
            tvWidget.activeChart().setSymbol(actualSymbol, function() {});
            if (interval) {
                tvWidget.activeChart().setResolution(interval, function() {});
            }
        }
    }

    // ─── Live price line ─────────────────────────────────────
    var livePriceLine = null;
    var lastLivePrice = 0;

    function updateLivePrice(price, isUp) {
        if (!tvWidget || !price || price <= 0) return;
        try {
            var chart = tvWidget.activeChart();
            var series = chart.getSeries && chart.getSeries();
            if (!series) {
                // Fallback: use shape-based approach
                return;
            }

            var color = isUp ? '#1DB954' : '#E54D42';

            if (livePriceLine) {
                // Update existing line
                livePriceLine.setPrice(price);
                livePriceLine.applyOptions({
                    color: color,
                    title: '',
                });
            } else {
                // Create new line
                livePriceLine = series.createPriceLine({
                    price: price,
                    color: color,
                    lineWidth: 1,
                    lineStyle: 2, // dashed
                    axisLabelVisible: true,
                    title: '',
                });
            }
            lastLivePrice = price;
        } catch(e) {
            // Series API may not be available in all TV versions
        }
    }

    function removeLivePriceLine() {
        if (livePriceLine && tvWidget) {
            try {
                var series = tvWidget.activeChart().getSeries();
                if (series) series.removePriceLine(livePriceLine);
            } catch(e) {}
            livePriceLine = null;
            lastLivePrice = 0;
        }
    }

    // Called from Swift to force the chart to re-fetch data
    function refreshData() {
        if (tvWidget) {
            tvWidget.activeChart().resetData();
        }
    }

    // Called from Swift to change resolution/interval
    function changeResolution(resolution) {
        if (tvWidget) {
            tvWidget.activeChart().setResolution(resolution, function() {});
        }
    }

    // Called from Swift to change chart type
    // TradingView types: 1=Bars, 2=Candles, 3=Line, 4=Area, 8=HeikinAshi, 9=HollowCandle
    function setChartType(type) {
        if (tvWidget) {
            tvWidget.activeChart().setChartType(type);
        }
    }

    </script>
</body>
</html>
